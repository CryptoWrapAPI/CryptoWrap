<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem;
    }

    .body-inner {
      max-width: 360px;
      width: 100%;
      text-align: center;
    }

    .qr-wrap {
      display: inline-block;
      padding: 0.5rem;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .qr-wrap img {
      display: block;
      width: 140px;
      height: 140px;
    }

    .qr-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: pointer;
    }

    .qr-overlay img {
      width: 80vw;
      max-width: 360px;
      height: auto;
    }

    .amount {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .amount span {
      color: #6a96ff;
      font-size: 0.9rem;
      font-weight: 400;
    }

    .address-box {
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      margin: 0.75rem 0 0.35rem;
      width: 100%;
    }

    .address-box div {
      width: 100%;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      word-break: break-all;
      line-height: 1.5;
      white-space: normal;
    }

    .copy-btn {
      width: 100%;
      background: none;
      border: 1px solid rgba(100, 150, 255, 0.2);
      color: #6a96ff;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      display: block;
      text-align: center;
      margin-bottom: 0.25rem;
      transition: background 0.2s;
    }

    .copy-btn:hover {
      background: rgba(100, 150, 255, 0.1);
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin: 0.75rem 0;
      font-size: 0.88rem;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #e0e0e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }

    .spinner.done {
      border: none;
      background: #6a96ff;
      border-radius: 50%;
      animation: none;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .success-msg {
      color: #6a96ff;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
      margin: 0.5rem 0;
    }

    .check-btn {
      width: 100%;
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 8px;
      padding: 0.65rem;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .check-btn:hover {
      background: #252532;
      border-color: rgba(100, 150, 255, 0.4);
    }

    .check-btn:active {
      transform: scale(0.98);
    }

    .check-btn.hidden {
      display: none;
    }

    .check-btn .spin-sm {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #e0e0e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    .check-btn.loading {
      pointer-events: none;
      opacity: 0.6;
    }

    .muted {
      color: #555;
      font-size: 0.72rem;
      margin-top: 0.75rem;
    }

    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.3);
      color: #e0e0e0;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding-top: 4rem;
    }

    .payment-content {
      display: none;
    }

    .payment-content.ready {
      display: block;
    }
  </style>
</head>

<body>

  <div class="body-inner">
    <div class="loading-screen" id="loading-screen">
      <div class="spinner"></div>
      <div style="color:#666;font-size:0.88rem;">Loading payment...</div>
    </div>

    <div class="payment-content" id="payment-content">

      <div>
        <div class="qr-wrap" id="qr-wrap"></div>
      </div>

      <div class="amount"><span id="amount-text"></span> <span id="currency-code"></span></div>
      <button class="copy-btn" id="copy-amount-btn">Copy Amount</button>

      <div class="address-box">
        <div id="address-display"></div>
      </div>
      <button class="copy-btn" id="copy-btn">Copy Address</button>

      <div class="status">
        <span class="spinner" id="spinner"></span>
        <span id="status-text">Waiting for payment...</span>
      </div>

      <div class="success-msg" id="success-msg">Payment received!</div>

      <button class="check-btn" id="check-btn">Check Now</button>
      <div class="muted" id="invoice-ref"></div>
    </div>
  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const INVOICE_UUID = new URLSearchParams(window.location.search).get('invoice_uuid') || '';
    const CHECK_URL = `/api/v1/payment/check_invoice?invoice_uuid=${INVOICE_UUID}`;

    let zoomed = false;
    let timerInterval;

    const $ = (id) => document.getElementById(id);
    const loadingScreen = $('loading-screen');
    const paymentContent = $('payment-content');
    const spinner = $('spinner');
    const statusText = $('status-text');
    const successMsg = $('success-msg');
    const toast = $('toast');
    const checkBtn = $('check-btn');
    const qrWrap = $('qr-wrap');
    const addressDisplay = $('address-display');
    const amountText = $('amount-text');
    const currencyCode = $('currency-code');

    let currentData = null;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function setStatus(status) {
      spinner.className = 'spinner' + (status === 'confirmed' ? ' done' : '');
      const labels = {waiting: 'Waiting for payment...', detected: 'Payment detected!', confirmed: 'Payment confirmed!', expired: 'Payment expired'};
      statusText.textContent = labels[status] || status;
      if (status === 'confirmed') {
        successMsg.style.display = 'block';
        checkBtn.classList.add('hidden');
        if (timerInterval) clearInterval(timerInterval);
      }
    }

    function updateUI(data) {
      currentData = data;

      if (!paymentContent.classList.contains('ready')) {
        // first load — populate all fields, then show content
        addressDisplay.textContent = data.wallet_address;
        amountText.textContent = data.amount_requested;
        currencyCode.textContent = data.currency;

        // QR code
        const qrImg = document.createElement('img');
        qrImg.src = `/api/v1/qr?size=140x140&data=${encodeURIComponent(data.wallet_address)}`;
        qrImg.alt = 'Payment QR Code';
        qrWrap.appendChild(qrImg);

        // Copy amount copies the requested amount
        $('copy-amount-btn').onclick = (e) => {
          navigator.clipboard.writeText(data.amount_requested).then(() => showToast('Amount copied!'));
        };

        loadingScreen.style.display = 'none';
        paymentContent.classList.add('ready');
      }

      setStatus(data.payment_status);
    }

    async function checkStatus() {
      checkBtn.classList.add('loading');
      checkBtn.innerHTML = '<span class="spin-sm"></span> Checking...';
      try {
        const resp = await fetch(CHECK_URL);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        updateUI(data);
      } catch (e) {
        statusText.textContent = 'Error checking payment';
      } finally {
        checkBtn.classList.remove('loading');
        checkBtn.innerHTML = 'Check Now';
      }
    }

    // Copy address
    $('copy-btn').addEventListener('click', () => {
      if (currentData) {
        navigator.clipboard.writeText(currentData.wallet_address).then(() => showToast('Address copied!'));
      }
    });

    // QR zoom toggle
    qrWrap.addEventListener('click', () => {
      if (zoomed) {
        const overlay = document.querySelector('.qr-overlay');
        if (overlay) overlay.remove();
        zoomed = false;
      } else {
        if (!currentData) return;
        const overlay = document.createElement('div');
        overlay.className = 'qr-overlay';
        const bigImg = document.createElement('img');
        bigImg.src = `/api/v1/qr?size=400x400&data=${encodeURIComponent(currentData.wallet_address)}`;
        bigImg.alt = 'Payment QR Code';
        overlay.appendChild(bigImg);
        overlay.addEventListener('click', () => {
          overlay.remove();
          zoomed = false;
        });
        document.body.appendChild(overlay);
        zoomed = true;
      }
    });

    // Check now
    checkBtn.addEventListener('click', checkStatus);

    // Auto-poll on load
    checkStatus();

    // Auto-poll every 10 seconds
    timerInterval = setInterval(() => {
      if (currentData && currentData.payment_status === 'confirmed') {
        clearInterval(timerInterval);
        return;
      }
      // silent background check without UI spinner
      fetch(CHECK_URL)
        .then(r => r.ok ? r.json() : null)
        .then(data => { if (data) updateUI(data); })
        .catch(() => {});
    }, 10000);
  </script>
</body>

</html>
