<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem;
    }
    .body-inner {
      max-width: 360px;
      width: 100%;
    }
    .qr-wrap {
      display: inline-block;
      padding: 0.5rem;
      background: #fff;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .qr-wrap img { display: block; width: 140px; height: 140px; }
    .qr-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      cursor: pointer;
    }
    .qr-overlay img { width: 80vw; max-width: 360px; height: auto; }
    .amount {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
    }
    .amount span { color: #6a96ff; font-size: 0.9rem; font-weight: 400; }
    .address-box {
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 8px;
      padding: 0.65rem 0.8rem;
      margin: 0.75rem 0 0.35rem;
      width: 100%;
    }
    .address-box div {
      width: 100%;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      word-break: break-all;
      line-height: 1.5;
      white-space: normal;
    }
    .copy-btn {
      width: 100%;
      background: none;
      border: 1px solid rgba(100, 150, 255, 0.2);
      color: #6a96ff;
      cursor: pointer;
      font-size: 0.78rem;
      padding: 0.4rem 0.7rem;
      border-radius: 6px;
      display: block;
      text-align: center;
      margin-bottom: 0.25rem;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: rgba(100, 150, 255, 0.1); }
    .status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0.75rem 0;
      font-size: 0.88rem;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-top-color: #e0e0e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .spinner.done { border-top-color: #6a96ff; animation: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .success-msg { color: #6a96ff; font-size: 0.88rem; font-weight: 500; display: none; margin: 0.5rem 0; }
    .check-btn {
      width: 100%;
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.2);
      border-radius: 8px;
      padding: 0.65rem;
      color: #e0e0e0;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .check-btn:hover { background: #252532; border-color: rgba(100, 150, 255, 0.4); }
    .check-btn:active { transform: scale(0.98); }
    .check-btn .spin-sm {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #e0e0e0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    .check-btn.loading { pointer-events: none; opacity: 0.6; }
    .muted { color: #555; font-size: 0.72rem; margin-top: 0.75rem; }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a24;
      border: 1px solid rgba(100, 150, 255, 0.3);
      color: #e0e0e0;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div class="body-inner">

    <div style="text-align: center;">
      <div class="qr-wrap" id="qr-wrap"></div>
    </div>

    <div class="amount" style="text-align: center;">0.0085 <span>LTC</span></div>

    <div class="address-box">
      <div id="address-display">ltc1qmock7address7for7demo7purposes7xyz</div>
    </div>
    <button class="copy-btn" id="copy-btn">Copy</button>

    <div class="status">
      <span class="spinner" id="spinner"></span>
      <span id="status-text">Waiting for payment...</span>
    </div>

    <div class="success-msg" id="success-msg">Payment received!</div>

    <button class="check-btn" id="check-btn">Check Now</button>

    <div class="muted" id="timer-text">Auto-refreshing in 5s</div>

  </div>

  <div class="toast" id="toast">Copied!</div>

  <script>
    const MOCK = {
      address: 'ltc1qmock7address7for7demo7purposes7xyz',
      amount: '0.0085',
      currency: 'LTC',
      statuses: ['waiting', 'waiting', 'waiting', 'detected', 'detected', 'confirmed'],
    };

    let step = 0;
    let timerInterval;
    let zoomed = false;

    const $ = (id) => document.getElementById(id);
    const spinner = $('spinner');
    const statusText = $('status-text');
    const successMsg = $('success-msg');
    const timerText = $('timer-text');
    const toast = $('toast');
    const checkBtn = $('check-btn');
    const qrWrap = $('qr-wrap');
    const addressDisplay = $('address-display');

    function setStatus(status) {
      spinner.className = 'spinner' + (status === 'confirmed' ? ' done' : '');
      const labels = { waiting: 'Waiting for payment...', detected: 'Payment detected!', confirmed: 'Payment confirmed!', expired: 'Payment expired' };
      statusText.textContent = labels[status] || status;
      if (status === 'confirmed') {
        successMsg.style.display = 'block';
        timerText.textContent = 'Payment complete';
        if (timerInterval) clearInterval(timerInterval);
      }
    }

    function advanceMockStatus() {
      if (step >= MOCK.statuses.length) return;
      setStatus(MOCK.statuses[step]);
      step++;
    }

    let countdown = 5;
    timerInterval = setInterval(() => {
      countdown--;
      if (countdown <= 0) { countdown = 5; advanceMockStatus(); }
      timerText.textContent = countdown > 0 ? `Auto-refreshing in ${countdown}s` : 'Checking...';
    }, 1000);

    // QR code
    const qrImg = document.createElement('img');
    qrImg.src = `/api/v1/qr?size=140x140&data=${encodeURIComponent(MOCK.address)}`;
    qrImg.alt = 'Payment QR Code';
    qrWrap.appendChild(qrImg);

    // QR zoom toggle
    qrWrap.addEventListener('click', () => {
      if (zoomed) {
        const overlay = document.querySelector('.qr-overlay');
        if (overlay) overlay.remove();
        zoomed = false;
      } else {
        const overlay = document.createElement('div');
        overlay.className = 'qr-overlay';
        const bigImg = document.createElement('img');
        bigImg.src = `/api/v1/qr?size=400x400&data=${encodeURIComponent(MOCK.address)}`;
        bigImg.alt = 'Payment QR Code';
        overlay.appendChild(bigImg);
        overlay.addEventListener('click', () => {
          overlay.remove();
          zoomed = false;
        });
        document.body.appendChild(overlay);
        zoomed = true;
      }
    });

    // Copy address
    $('copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(MOCK.address).then(() => {
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
      });
    });

    // Check Now button
    checkBtn.addEventListener('click', () => {
      checkBtn.classList.add('loading');
      checkBtn.innerHTML = '<span class="spin-sm"></span> Checking...';
      setTimeout(() => {
        advanceMockStatus();
        checkBtn.classList.remove('loading');
        checkBtn.innerHTML = 'Check Now';
      }, 800);
    });
  </script>
</body>
</html>
